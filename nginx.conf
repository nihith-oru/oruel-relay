server {
    listen 80;
    server_name relay.oru-el.com;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Nginx reverse proxy to local Express server running on port 4000
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Real IP / Cloudflare header passing
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cloudflare connecting IP if you want the exact client IP
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    # Custom log paths
    access_log /var/log/nginx/oruel_relay_access.log;
    error_log /var/log/nginx/oruel_relay_error.log;

    client_max_body_size 10M;
}
